name: Promote published release to -latest pointer

# 사람이 devvault-v* Draft 릴리스를 Publish하는 순간, 그 버전의 자산을
# 자동 업데이트 endpoint가 바라보는 고정 릴리스(<product>-latest)로 복제한다.
# → "Publish 클릭" 하나가 게이트이고, latest.json 포인터 갱신은 자동.
on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: promote-latest-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  promote:
    # 포인터 릴리스(<product>-latest) 자신이 publish될 때 재귀 실행되는 것을 막는다.
    # (추가 안전장치: GITHUB_TOKEN으로 만든 릴리스는 애초에 workflow를 재트리거하지 않음)
    if: ${{ !endsWith(github.event.release.tag_name, '-latest') }}
    runs-on: ubuntu-latest
    steps:
      # gh release 하위명령이 대상 레포를 git 원격에서 추론하므로 checkout이 필요하다.
      # (GH_REPO 만으로는 gh가 여전히 git 컨텍스트를 찾다 "not a git repository"로 실패)
      - uses: actions/checkout@v4
      - name: Sync published version assets onto <product>-latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          # 버전 태그(<product>-v<semver>)만 처리한다. 그 외 태그는 무시.
          case "$TAG" in
            *-v*) : ;;
            *) echo "skip: '$TAG' 은 버전 태그가 아님"; exit 0 ;;
          esac

          product="${TAG%-v*}"          # devvault-v0.2.0 -> devvault
          latest_tag="${product}-latest"
          workdir="$(mktemp -d)"

          echo "promote: $TAG -> $latest_tag"

          # 발행된 버전 릴리스의 모든 자산(설치본 + latest.json + 서명)을 내려받는다.
          gh release download "$TAG" --dir "$workdir"

          # 기존 포인터 릴리스와 태그를 제거하고, 새 자산으로 재생성한다.
          gh release delete "$latest_tag" --yes --cleanup-tag || true
          gh release create "$latest_tag" "$workdir"/* \
            --title "${product} latest (auto-update pointer -> ${TAG})" \
            --notes "자동 업데이트 endpoint 전용 고정 릴리스입니다. 배포 노트는 ${TAG} 릴리스를 참고하세요."

          echo "done: $latest_tag 가 $TAG 자산으로 갱신됨"
